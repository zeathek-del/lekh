        70: { type: "normal-luck", text: "бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһ¬бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһўбһ¶бһҹбҹ’бһҡбҹҗбһҷбһӣбһҫбһ—бһ¶бһ–бһҖбҹ’бһӣбһ¶бһ бһ¶бһ“" },
        71: { type: "bad-luck", text: "бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ”бһ¶бһ“бһ бһҫбһҷбһҸбҹӮбһ”бҹ’бһҡбҹӮбһҮбһ¶бһ”бһ¶бһҸбҹӢбһ”бһ„бҹӢбһ‘бҹ…бһңбһ·бһүбһ–бһ·бһ”бһ¶бһҖбһҹбҹҶбһҡбҹҒбһ…бһҸбһ¶бһҳбһ”бҹҶбһҺбһ„бһҺбһ¶бһҹбҹӢ" },
        72: { type: "good-luck", text: "бһӣбҹ’бһў = бһҳбһ¶бһ“бһҹбһ»бһ—бһҳбһ„бҹ’бһӮбһӣбһ“бһ·бһ„бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһў" },
        73: { type: "normal-luck", text: "бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһ”бһҫбһҹбһ·бһ“бһҮбһ¶бһҡбһ»бһүбһҡбһ¶бһ–бһ·бһ”бһ¶бһҖбһ“бһ·бһ„бһ‘бһ‘бһҪбһӣбһҮбҹ„бһӮбһҮбҹҶбһ“бҹҮбһҺбһ¶бһҹбҹӢ" },
        74: { type: "normal-luck", text: "бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢбһҖбҹҸбһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһўбһҖбҹ’бһҡбһҖбҹӢбһҠбҹӮбһҡ" },
        75: { type: "bad-luck", text: "бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҖбһ¶бһҡбһ„бһ¶бһҡбһҡбһҖбһҹбҹҠбһёбһҒбһ¶бһҸбһ”бһ„бҹӢбһұбһҖбһ¶бһҹ бһўбһҹбҹӢбһ‘бҹ’бһҡбһ–бҹ’бһҷбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·" },
        76: { type: "good-luck", text: "бһӣбҹ’бһў = бһ–бһ·бһ”бһ¶бһҖбһҳбһ»бһ“бһҹбҹ’бһҡбһҺбһ»бһҖбһҖбҹ’бһҡбҹ„бһҷ" },
        77: { type: "normal-luck", text: "бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһӣбһ¶бһ—бһҳбһ¶бһ“бһ”бһ„бҹӢбһҳбһ·бһ“бһўбһ¶бһ…бһҹбҹ’бһҸбһ»бһҖбһҹбҹ’бһҸбһҳбҹ’бһ—" },
        78: { type: "normal-luck", text: "бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһўбһ“бһ¶бһӮбһҸбһҳбһ·бһ“бһҹбһјбһңбһ—бҹ’бһӣбһәбһҹбҹ’бһңбһ¶бһ„бһ‘бҹҒбһ бһҫбһҷбһҖбҹҸбһҳбһ·бһ“бһҹбһјбһңбһҳбһ¶бһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһҠбҹӮбһҡ" },
        79: { type: "bad-luck", text: "бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ”бһ¶бһ“бһ бһҫбһҷбһҸбҹӮбһ”бҹ’бһҡбҹӮбһҮбһ¶бһҒбһ¶бһҸбһ”бһ„бҹӢбһ‘бҹ…бһңбһ·бһүбһҒбһ·бһҸбһҒбҹҶбһҘбһҸбһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚ" },
        80: { type: "good-luck", text: "бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһ…бҹ’бһҡбһҫбһ“бҹ”" }
    };

    function predictFortune() {
        const phoneInput = document.getElementById('phoneNumber').value.trim();
        const resultDiv = document.getElementById('result');
        
        // бһӣбһҖбҹ’бһҒбһҒбһҺбҹ’бһҢбһ‘бһёбҹЎбҹ– бһ”бһҫбһҳбһ·бһ“бһ”бһ¶бһ“бһ”бһүбҹ’бһ…бһјбһӣбһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘ бһҸбҹ’бһҡбһјбһңбһӣбҹ„бһҸ Message Box бһ”бҹ’бһҡбһ¶бһ”бҹӢ
        if (phoneInput === "") {
            alert("бһҹбһјбһҳбһ”бһүбҹ’бһ…бһјбһӣбһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘бһҡбһ”бһҹбҹӢбһўбҹ’бһ“бһҖбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“!");
            resultDiv.style.display = 'none';
            return;
        }

        // бһӣбһҖбҹ’бһҒбһҒбһҺбҹ’бһҢбһ‘бһёбҹўбҹ– бһ”бҹ’бһҡбһўбһ”бҹӢбһ”бһүбҹ’бһ…бһјбһӣбһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘бһўбһ¶бһ…бһ”бһүбҹ’бһ…бһјбһӣбһ”бһ¶бһ“бһҸбҹӮбһӣбҹҒбһҒбһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮ
        const numberRegex = /^[0-9]+$/;
        if (!numberRegex.test(phoneInput)) {
            alert("бһҹбһјбһҳбһ”бһүбҹ’бһ…бһјбһӣбһҸбҹӮбһӣбҹҒбһҒбһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮ (бһҳбһ·бһ“бһўбһ“бһ»бһүбҹ’бһүбһ¶бһҸбһұбҹ’бһҷбһҳбһ¶бһ“бһўбһҖбҹ’бһҹбһҡ бһ¬бһ“бһ·бһҳбһ·бһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһЎбһҫбһҷ)!");
            resultDiv.style.display = 'none';
            return;
        }

        // бһӣбһҖбҹ’бһҒбһҒбһҺбҹ’бһҢбһ‘бһёбҹЈбҹ– бһҸбҹ’бһҡбһјбһңбһҳбһ¶бһ“бһҷбҹүбһ¶бһ„бһ бҹ„бһ…бһҺбһ¶бһҹбҹӢ бҹҰ бһҒбҹ’бһ‘бһ„бҹӢбһҠбһҫбһҳбҹ’бһ”бһёбһӮбһҺбһ“бһ¶
        if (phoneInput.length < 6) {
            alert("бһҹбһјбһҳбһ”бһүбҹ’бһ…бһјбһӣбһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘бһұбҹ’бһҷбһ”бһ¶бһ“бһҷбҹүбһ¶бһ„бһ бҹ„бһ…бһҺбһ¶бһҹбҹӢ бҹҰ бһҒбҹ’бһ‘бһ„бҹӢбһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷ!");
            resultDiv.style.display = 'none';
            return;
        }

        // бһ…бһ¶бһ”бҹӢбһҷбһҖбһӣбҹҒбһҒ бҹҰ бһҒбҹ’бһ‘бһ„бҹӢбһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷ
        const lastSixDigits = phoneInput.slice(-6);
        const lastSixNumber = parseInt(lastSixDigits, 10);

        // бһңбһ·бһ’бһёбһҹбһ¶бһҹбҹ’бһҸбҹ’бһҡбһӮбһҺбһ“бһ¶бҹ– бһҷбһҖбһӣбҹҒбһҒ бҹҰ бһҒбҹ’бһ‘бһ„бҹӢбһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷбһ…бҹӮбһҖбһ“бһ№бһ„ бҹЁбҹ 
        const divisionResult = lastSixNumber / 80;
        
        // бһҷбһҖбһӣбҹҒбһҒбһҖбҹ’бһҡбҹ„бһҷбһҖбҹ’бһ”бҹҖбһҹ (Decimal part)
        const decimalPart = divisionResult - Math.floor(divisionResult);
        
        // бһҡбһҪбһ…бһҷбһҖбһӣбҹҒбһҒбһҖбҹ’бһҡбҹ„бһҷбһҖбҹ’бһ”бҹҖбһҹбһҳбһҖбһӮбһ»бһҺбһ“бһ№бһ„ бҹЁбҹ  бһңбһ·бһү (бһ”бҹ’бһҡбһҫ Math.round бһҠбһҫбһҳбҹ’бһ”бһёбһ”бһ„бҹ’бһӮбһҸбҹӢбһҖбһ»бҹҶбһұбҹ’бһҷбһҳбһ¶бһ“бһ”бһүбҹ’бһ бһ¶бһҖбҹ’бһ”бҹҖбһҹбһҡбһ”бһҹбҹӢ JavaScript)
        let finalIndex = Math.round(decimalPart * 80);

        // бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһӣбһ‘бҹ’бһ’бһ•бһӣбһҹбҹ’бһҳбһҫ 0 бһҳбһ¶бһ“бһ“бҹҗбһҷбһҗбһ¶бһңбһ¶бһ…бҹӮбһҖбһҠбһ¶бһ…бҹӢ бһҠбһјбһ…бҹ’бһ“бҹҒбҹҮбһӣбһ‘бҹ’бһ’бһ•бһӣбһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷбһӮбһәбһӣбҹҒбһҒ 80
        if (finalIndex === 0) {
            finalIndex = 80;
        }

        // бһ”бһ„бҹ’бһ бһ¶бһүбһӣбһ‘бҹ’бһ’бһ•бһӣбһ“бҹ…бһӣбһҫбһўбҹҒбһҖбҹ’бһҡбһ„бҹӢ
        const fortune = fortuneData[finalIndex];
        if (fortune) {
            resultDiv.className = `result-box ${fortune.type}`;
            resultDiv.innerHTML = `
                <div class="result-title">бһӣбһ‘бҹ’бһ’бһ•бһӣбһӣбҹҒбһҒбһҹбһҳбҹ’бһӮбһ¶бһӣбҹӢбҹ– ${finalIndex}</div>
                <div>${fortune.text}</div>
            `;
            resultDiv.style.display = 'block';
        }
    }
</script>
